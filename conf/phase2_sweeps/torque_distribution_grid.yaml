kind: shape_stability_grid
metadata:
  role: sweep
  canonical: true
  description: Canonical shape stability sweep for the Issue 97 torque-distribution 2x2 comparison.
  recommended_heatmap_profile: conf/phase2_sweeps/shape_stability_heatmap.yaml
args:
  config: conf/sim_swim.yaml
  mode: torque-profile-grid
  output_dir: outputs/phase2_sweeps/torque_distribution_grid
  duration_s: 0.6
  dt_star: 1.0e-4
  torque_nm: 2.0e-20
  n_flagella: 3
  attach_seed: 0
  phase_seed: 0
  fixed_attach_first_spring_scale: 1.0
  fixed_body_axis_angle_scale: 1.0
  fixed_first_second_spring_scale: 1.0
  fixed_attach_frame_position_scale: 3.0
  fixed_attach_frame_tangent_scale: 1.5
  force_distributions:
    - root_torque_segment_couples
    - root_torque_axis_projection
  torque_distribution_profiles:
    - diffusive
    - uniform
  progress_interval: 5000
