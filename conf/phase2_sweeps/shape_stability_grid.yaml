kind: shape_stability_grid
metadata:
  role: sweep
  canonical: true
  description: Canonical shape stability sweep profile for preset local mitigation comparisons.
  recommended_heatmap_profile: conf/phase2_sweeps/shape_stability_heatmap.yaml
args:
  config: conf/sim_swim.yaml
  mode: preset
  output_dir: outputs/phase2_sweeps/shape_stability_grid
  duration_s: 0.5
  dt_star: 1.0e-4
  torque_nm: 2.5e-20
  n_flagella: 3
  progress_interval: 1000
