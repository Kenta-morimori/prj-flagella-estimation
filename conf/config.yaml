data:
  video_path: "data/20250716data1.avi"
  # video_path: "data/sample1.mp4"
  fps: 0  # 0なら動画のメタデータを使用
  bac_short_axis_length_um: 1.0  # バクテリア短径[μm]
  um_per_px: 0.203  # 1ピクセルあたりの長さ[μm]

output:
  base_dir: "outputs"

tracking_butt:
  detection:
    preprocess:
      method: "bg_subtract"    # "tophat" or "bg_subtract" or "none"
      kernel_size: 15
    threshold:
      method: "otsu"           # "otsu" or "adaptive"
      invert: false
      block_size: 35
    filter:
      min_area_px: 5
      max_area_frac: 0.05      # 画像面積比で巨大成分を弾く
      max_minor_factor: 3.0    # 短軸期待値に掛ける上限係数
      reject_border_touch: true

  tracking:
    max_link_distance: 30.0

  butt_estimation:
    smooth_window: 5
    freeze_speed_thresh: 0.5
    features:
      - speed
      - vel_axis_dot
      - heading_change

  save:
    contour: false   # デフォルトfalse

# NOTE: Phase2/3 (flagella inference) will likely reuse some of the same features.
#       Keep feature names consistent across tasks.
