feature_categories:
  metadata:
    target: sample_and_simulation_settings
    ml_candidate: false
    variables:
      - sample_id  # sample単位の識別ID
      - dataset_id  # dataset単位の識別ID
      - n_flagella  # べん毛本数
      - seed  # 互換用simulation seed
      - attach_seed  # 付着点選択seed
      - phase_seed  # 初期helix phase seed
      - duration_s  # 評価時間
      - dt_star  # 無次元時間刻み
      - torque_Nm  # motor torque
      - force_distribution  # motor force distribution mode
      - condition_tag  # 条件ラベル

  quality:
    target: qc
    ml_candidate: false
    variables:
      - quality_class  # sample品質分類
      - shape_pass  # strict shape gate通過フラグ
      - relaxed_pass  # relaxed判定通過フラグ
      - use_for_analysis  # 分析利用フラグ
      - use_for_ml_candidate  # ML候補利用フラグ
      - review_required  # 目視レビュー要否
      - valid_duration_s  # 有効評価時間

  cell_translation:
    target: cell
    ml_candidate: true
    variables:
      - cell_displacement  # body重心の正味変位
      - cell_path_length  # body重心の移動経路長
      - cell_mean_speed  # body重心の平均速度
      - cell_speed_std  # body重心速度の標準偏差
      - cell_speed_cv  # body重心速度の変動係数
      - cell_straightness  # 直進性指標

  cell_orientation:
    target: cell
    ml_candidate: true
    variables:
      - cell_axis_angle_change  # body axisの姿勢角変化
      - cell_axis_angle_std  # body axis角度の標準偏差
      - cell_angular_velocity_mean  # body angular velocityの平均
      - cell_angular_velocity_std  # body angular velocityの標準偏差
      - cell_angular_velocity_rms  # body angular velocityのRMS
      - cell_wobble  # body姿勢揺らぎ

  flagella_axis:
    target: flagella
    ml_candidate: true
    variables:
      - flagella_axis_alignment  # べん毛螺旋軸の整列度
      - flagella_axis_spread  # べん毛螺旋軸方向のばらつき
      - flagella_axis_pair_angle_mean  # べん毛螺旋軸pair角度の平均
      - flagella_axis_pair_angle_max  # べん毛螺旋軸pair角度の最大
      - flagella_axis_rear_alignment  # 菌体後方方向との整列度

  cell_flagella_relation:
    target: relation
    ml_candidate: true
    variables:
      - cell_flagella_axis_angle  # body axisとべん毛螺旋軸の角度
      - cell_flagella_axis_angle_std  # body/flagella軸角度の標準偏差
      - cell_flagella_axis_stability  # body/flagella軸関係の安定性

  diagnostics:
    target: qc
    ml_candidate: false
    variables:
      - hook_drift  # hook drift指標
      - hook_wrapped  # hook巻き付き候補フラグ
      - flyaway  # fly-away候補指標
      - abnormal_rotation  # 異常回転候補指標
      - first_fail_category  # 最初に破綻したカテゴリ
