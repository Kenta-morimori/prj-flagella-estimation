dataset_id: fc_nf1_2_3_6_asprefix_ps1_dur0p5
run_batch_id: fc_nf1_2_3_6_asprefix_ps1_dur0p5

base_config: conf/sim_swim.yaml
feature_schema: conf/phase2_analysis/flagella_count_behavior_features.yaml

sweep:
  n_flagella: [1, 2, 3, 6]
  attach_seed_mode: center_priority_prefix
  phase_seeds: [0]

base_overrides:
  time.duration_s: 0.5
  time.dt_star: 1.0e-4
  motor.torque_Nm: 2.5e-20
  motor.enable_switching: false
  motor.force_distribution: root_torque_segment_couples
  flagella.placement_mode: seeded_surface
  flagella.initial_phase_mode: seeded
  flagella.initial_helix_axis_from_rear_deg: 0
  output_sampling.out_all_steps_3d: false
  output_sampling.fps_out_3d: 25.0
  output_sampling.fps_out_2d: 25.0

runner:
  flush_interval_steps: 100
  sample_order: interleave_n_flagella

output:
  run_batch_dir: outputs/phase2_analysis/flagella_count_behavior/runs/fc_nf1_2_3_6_asprefix_ps1_dur0p5
  dataset_dir: outputs/phase2_analysis/flagella_count_behavior/datasets/fc_nf1_2_3_6_asprefix_ps1_dur0p5
  save_numeric_timeseries: true
  timeseries_sampling: all_steps
