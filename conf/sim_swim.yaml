# Watari & Larson 2010 (no-wall v1) に合わせた Phase2 設定

scale:
  b_um: 1.0                    # [um] 長さスケール b（菌体長軸の半分）
  bead_radius_a_over_b: 0.1    # [-] ビーズ半径 a/b（RPY の a）

body:
  prism:
    n_prism: 3                 # [-] 断面角数（Fig.1: 三角柱）
    dz_over_b: 0.5             # [-] 層間隔 dz/b（Fig.1）
    radius_over_b: 0.5         # [-] 断面半径（中心から断面ビーズ）
    axis: "x"                 # 軸方向
  length_total_um: 2.0         # [um] 菌体全長（L_over_b が dz_over_b の整数倍必須）

flagella:
  n_flagella: 3                # [-] べん毛本数（論文条件）
  placement_mode: "seeded_surface"   # values: seeded_surface（seed依存で中心+前後層へ付着）, uniform（旧互換）
  initial_phase_mode: "seeded"        # values: seeded（phase_seed依存）, uniform（旧互換の等間隔phase）
  init_mode: "paper_table1"   # 初期べん毛のsource-of-truth: bond/theta/phi/n_beads
  n_beads_per_flagellum: 11    # [-] 各べん毛の初期ビーズ数（論文離散化準拠）
  discretization:
    ds_over_b: 0.58            # [-] 隣接間隔 ds/b（Table 1 の L=0.58b 相当）
  bond_L_over_b: 0.58          # [-] べん毛spring平衡長 L/b
  length_over_b: 5.8           # [-] 初期べん毛長（離散化計算に使用）
  helix_init:
    radius_over_b: 0.25        # [-] 初期ヘリックス半径（直径0.5b）
    pitch_over_b: 2.5          # [-] 初期ヘリックスピッチ
  initial_helix_axis_from_rear_deg: null  # [deg|null] null: 従来side-attach, 0: 第2ビーズ以降の螺旋軸を菌体後方へ揃える
  # NOTE: base tangent / hook configuration is always side-attach (no toggle flag)

fluid:
  viscosity_Pa_s: 0.001        # [Pa*s] 水相当

motor:
  torque_Nm: 2.5e-20      # [N*m] Phase 2代表条件のモータートルク(Torque, T)．-1のときはτ=1になるよう「η * b^3」と定義する．
  # motor torque をbead forceへ変換する方式。
  # - root_torque_segment_couples: 既定値。root起点のねじりをsegmentごとのlocal force coupleとして分配し、形状安定性を優先する。
  # - root_torque_axis_projection: flagellum軸まわりの接線方向へzero-net-forceで分配し、軸中心回転の参照比較に使う。
  # - triplet: 従来方式。attach-first-second の局所3点へ力カップルを入れる。root近傍の診断baselineとして残す。
  force_distribution: "root_torque_segment_couples"
  # 上の force_distribution の中で、torque を root から先端へどう空間分配するか。
  # - diffusive: 既定値。root で入った回転活動が先端側へ拡散したとみなして配分し、後方条件の主採用候補とする。
  # - diffusive_sqrt: diffusive より均しつつ、root 由来の偏りは残す。
  # - diffusive_floor_0p2 / diffusive_floor_0p4: basal 側の最小配分を持たせた diffusive 比較条件。
  # - uniform: 全 bead / segment に一様に配分する参照比較条件。
  torque_distribution_profile: "diffusive"
  reverse_n_flagella: 1        # [-] tumble で反転するべん毛本数
  enable_switching: false      # false: run固定（多形切替なし）
  local_hook_scale: 1.0        # [-] 1.0が論文モデル相当。変更時は診断条件としてwarningを出す
  local_spring_scale: 1.0      # [-] 1.0が論文モデル相当。変更時は診断条件としてwarningを出す
  local_attach_first_spring_scale: 1.0      # [-] attach-first距離補強。1.0で追加補強なし
  local_attach_first_body_axis_angle_scale: 1.0  # [-] attach->first とbody長軸の90度補強。1.0で追加補強なし
  local_first_second_spring_scale: 1.0      # [-] first-second距離補強。主破綻の flag bond 過伸長は改善しなかったため default 不採用
  local_attach_frame_position_scale: 1.25   # [-] body表面局所frameでのattach->first位置補強。hook安定性と自然な軸中心回転の最良折衷
  local_attach_frame_tangent_scale: 1.0     # [-] body表面局所frameでのfirst->second根元接線補強。菌体ごとの剛体回転を招きやすく default 不採用
  local_attach_frame_tangent_mode: "vector" # vector / basal_bearing。basal_bearingは軸まわりspinを許す#103診断用
  local_bend_scale: 1.0        # [-] 1.0が論文モデル相当。変更時は診断条件としてwarningを出す
  local_torsion_scale: 1.0     # [-] 1.0が論文モデル相当。変更時は診断条件としてwarningを出す

potentials:
  spring:
    H_over_T_over_b: 10.0      # [-] H = 10 * Torque / b（paper-aligned default）
    s: 0.1                     # [-] 伸長限界 s/b（paper-aligned default）
  bend:
    kb_over_T: 20.0            # [-] kb = 20 * T
    theta0_deg:
      normal: 142.0            # [deg] normal 多形の平衡曲げ角
      semicoiled: 90.0         # [deg] semicoiled 多形
      curly1: 105.0            # [deg] curly1 多形
  torsion:
    kt_over_T: 10.0            # [-] kt = 10 * Torque
    fd_eps_over_b: 1e-3        # [-] current baseline（paper_table1運用時の候補）
    phi0_deg:
      normal: -60.0            # [deg] normal 多形の平衡二面角
      semicoiled: 65.0         # [deg] semicoiled 多形
      curly1: 120.0            # [deg] curly1 多形
  spring_spring_repulsion:
    A_ss_over_T: 1.0           # [-] A_ss = 1 * Torque
    a_ss_over_b: 0.2           # [-] 反発距離スケール a_ss/b
    cutoff_over_b: 0.2         # [-] 反発カットオフ距離/b

hook:
  enabled: true
  threshold_deg: 90.0          # [deg] hook曲げを課す閾値
  kb_over_T: 20.0              # [-] hook曲げ剛性比: kb_over_T = 20 * Torque

body_equiv_load:
  enabled: false                        # true: body-only切り分け用の等価荷重を有効化
  mode: "none"                         # none / pure_couple / attach_proxy_local / distributed_rear_load
  target_torque_Nm: 0.0                # [N*m] pure_couple モードの目標トルク（現実装は絶対値運用）
  target_force_N: 0.0                  # [N] attach/distributed モードの目標力スケール（現実装は絶対値運用）
  attach_region_id: 0                  # [-] attach_proxy_local モードのrear層ローカルID

run_tumble:
  run_tau: 1200.0              # [tau] run 継続時間（Fig.3 例）
  tumble_tau: 800.0            # [tau] tumble 継続時間
  semicoiled_tau: 400.0        # [tau] tumble 前半（semicoiled）
  curly1_tau: 400.0            # [tau] tumble 後半（curly1）

time:
  duration_s: 0.1              # [s] 物理時間（デバッグ固定）
  dt_s: 1.0e-3                 # [s] 出力・記録間隔。dt_star=null時は内部積分刻みとしても使う
  dt_star: 1.0e-4              # [-] Phase 2標準の内部積分刻み。null時はdt_s/tau_sを使用

output_sampling:
  out_all_steps_3d: false      # false: 3D は fps_out_3d で間引く。全内部step描画は明示override時のみ
  fps_out_3d: 25.0             # [Hz] 3D動画出力fps（out_all_steps_3d=false のとき）
  fps_out_2d: 25.0             # [Hz] 2D は固定25Hzで間引き

brownian:
  enabled: false               # false: 決定論, true: FDT整合ノイズ
  temperature_K: 298.0         # [K] 温度（T=kB*Temp）
  method: "cholesky"          # cholesky / eigh
  jitter: 1.0e-20              # 数値安定化用

render:
  image_size_px: 256
  pixel_size_um: 0.203
  flagella_linewidth_px: 2.0
  render_flagella: true         # 3D描画でべん毛を描画
  render_flagella_2d: false     # 2D描画でべん毛を描画（デフォルトOFF）

  save_frames_3d: false
  follow_camera_3d: true       # true: 3D追従カメラ
  view_range_um: 5.0           # [um] 3D表示範囲（中心±R）
  timestamp_3d: true
  timestamp_fmt: "t = {t:.3f} s"
  label_flagella: true         # F0/F1/F2 ラベル
  show_flagella_helix_axis_3d: false  # true: 第2ビーズ以降から推定した螺旋中心軸を3Dに重ねる

  follow_camera_2d: false      # false: 2D固定カメラ
  center_body_in_2d: true      # true: 2D投影では菌体重心を画像中心へ固定
  save_frames_2d: false

seed:
  global_seed: 0
  attach_seed: null
  phase_seed: null

output:
  base_dir: outputs
  timestamp_subdir: true
