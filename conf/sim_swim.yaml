discretization:
  ds_um: 0.8

body:
  length_total_um: 3.0
  diameter_um: 0.8
  bond_L_um: null

flagella:
  n_flagella: 4
  length_um: 6.4
  bond_L_um: null
  pitch_um: 2.3
  radius_um: 0.2
  filament_diameter_um: 0.02
  placement_mode: uniform
  helix_step_um: 0.2

scale:
  bead_radius_a_um: 0.15

fluid:
  viscosity_Pa_s: 0.001

motor:
  torque_Nm: 4.0e-18
  reverse_n_flagella: 1

potentials:
  spring:
    H: 1.0e-4
    s_um: 0.15
  bend:
    kb: 2.0e-19
    theta0_deg:
      normal: 25.0
      semicoiled: 55.0
      curly1: 75.0
  torsion:
    kt: 2.0e-19
    phi0_deg:
      normal: 15.0
      semicoiled: 95.0
      curly1: 145.0
  spring_spring_repulsion:
    A_ss: 2.0e-19
    a_ss_um: 0.1
    cutoff_um: 0.6

hook:
  enabled: true
  kb: 8.0e-20
  threshold_deg: 90.0

run_tumble:
  run_tau: 0.20
  tumble_tau: 0.08
  semicoiled_tau: 0.03
  curly1_tau: 0.03

brownian:
  enabled: false
  temperature_K: 298.0
  method: cholesky
  jitter: 1.0e-20

time:
  dt: 0.002
  fps_out: 25.0
  duration_s: 0.5

render:
  image_size_px: 256
  pixel_size_um: 0.203
  render_flagella: false
  flagella_linewidth_px: 3.0

seed:
  global_seed: 0

output:
  base_dir: outputs
