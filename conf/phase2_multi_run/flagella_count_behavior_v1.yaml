kind: generic_multi_run
metadata:
  role: sweep
  canonical: true
  description: Phase 2.8 flagella-count behavior improved-model dataset v1
  source_issue: https://github.com/Kenta-morimori/prj-flagella-estimation/issues/119
  model_id: flag_spring2p25_body2p5_candidate
  dataset_version: v1
  dataset_revision: r0
  dataset_scope: nf1_2_3_4_as3_ps3_dur1p0
  model_revision: flag_spring2p25_body2p5_candidate
  version_role: training_candidate
  training_candidate: n=1,2,3
  canonical_output_status: generated
  model_notes:
    - RUN fixed with motor.enable_switching=false
    - root_torque_segment_couples torque distribution
    - basal freedom default keeps local_attach_frame_position_scale=1.25
    - stiffness_scales.flag_spring=2.25 from Issue #116 handoff
    - stiffness_scales.body=2.5 from Issue #116 handoff
    - n=5,6 are excluded because Issue #116 did not find v1-ready conditions
    - torque_Nm=2.0e-20
  source_handoff: conf/phase2_multi_run/flagella_count_stability_narrow_seed00.yaml
  smoke_check: conf/phase2_multi_run/flagella_count_stability_smoke_seed00.yaml

base_config: conf/sim_swim.yaml

base_overrides:
  time.duration_s: 1.0
  time.dt_star: 1.0e-4
  motor.torque_Nm: 2.0e-20
  motor.enable_switching: false
  motor.force_distribution: root_torque_segment_couples
  motor.local_first_second_spring_scale: 1.0
  stiffness_scales.flag_spring: 2.25
  stiffness_scales.body: 2.5
  flagella.placement_mode: seeded_surface
  flagella.initial_phase_mode: seeded
  flagella.initial_helix_axis_from_rear_deg: 0
  output_sampling.out_all_steps_3d: false
  output_sampling.fps_out_3d: 25.0
  output_sampling.fps_out_2d: 25.0

sweep:
  axes:
    attach_seed:
      key: seed.attach_seed
      short_name: as
      values: [0, 1, 2]
      labels: ["0", "1", "2"]
      ids: [as000, as001, as002]
    phase_seed:
      key: seed.phase_seed
      short_name: ps
      values: [0, 1, 2]
      labels: ["0", "1", "2"]
      ids: [ps000, ps001, ps002]
    n_flagella:
      key: flagella.n_flagella
      short_name: nf
      values: [1, 2, 3, 4]
      labels: ["1", "2", "3", "4"]
      ids: [nf01, nf02, nf03, nf04]

dataset:
  dataset_id: v1
  feature_schema: conf/phase2_analysis/flagella_count_behavior_features.yaml
  output_dir: outputs/phase2_analysis/flagella_count_behavior/datasets/v1
  sample_id_template: "nf{n_flagella:02d}_as{attach_seed:03d}_ps{phase_seed:03d}"
  timeseries_sampling: all_steps

replay:
  mode: both
  fps_out_3d: 10.0
  max_panels_per_grid: 9
  output_subdir: replay

plot:
  default_x_axis: n_flagella
  default_y_axis: attach_seed
  filter_axes:
    phase_seed: "0"
  metrics:
    - first_fail_t_s
    - hook_len_rel_err_max
    - max_flag_bond_rel_err
    - body_spring_max_stretch_ratio
    - body_centerline_max_deviation_um
    - body_roll_net_abs_revolutions
    - axis_center_to_body_roll_ratio_mean

output:
  base_dir: outputs/phase2_multi_run/flagella_count_behavior_v1
  timestamp_subdir: false
  save_state_archive: true
  progress_interval: 1000
